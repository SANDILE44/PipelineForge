<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PipelineForge Outreach</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="container">

<header>
<h1>PipelineForge Outreach System</h1>
</header>



<!-- SETTINGS -->

<section class="card">

<h2>Settings</h2>

<div class="grid">

<div>
<label>Default City</label>
<input type="text" id="defaultLocation" placeholder="Example: Durban">
</div>

<div>
<label>Select Industry</label>
<select id="industrySelect"></select>
</div>

<div>
<label>Add Industry</label>
<input type="text" id="newIndustry" placeholder="Example: Marketing">
<button id="addIndustryBtn">Add</button>
</div>

</div>

</section>



<!-- MESSAGE COMPOSER -->

<section class="card">

<h2>Message Template</h2>

<div class="grid">

<div>
<label>Subject</label>
<input id="subject" placeholder="Subject">
</div>

<div>
<label>Message</label>
<textarea id="message" placeholder="Write outreach message"></textarea>
</div>

<div>
<label>Attach Image</label>
<input type="file" id="imageUpload">
</div>

<div>
<button id="saveTemplate">Save Template</button>
</div>

</div>

</section>



<!-- BUSINESS DISCOVERY -->

<section class="card">

<h2>Discover Businesses</h2>

<div class="grid">

<div>
<label>City</label>
<input id="searchLocation" placeholder="City">
</div>

<div>
<label>Industry</label>
<select id="searchIndustry"></select>
</div>

<div>
<button id="findBusinesses">Find Businesses</button>
</div>

</div>

</section>



<!-- RESULTS -->

<section class="card">

<h2>Discovered Businesses</h2>

<div class="table-wrap">

<table id="resultsTable">

<thead>
<tr>
<th>Business</th>
<th>Email</th>
<th>Phone</th>
<th>Website</th>
<th>Send</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</section>



<!-- OUTREACH TRACKER -->

<section class="card">

<h2>Outreach Tracker</h2>

<div class="table-wrap">

<table id="trackerTable">

<thead>
<tr>
<th>Business</th>
<th>Industry</th>
<th>City</th>
<th>Contact</th>
<th>Platform</th>
<th>Status</th>
<th>Follow Up</th>
<th>Timer</th>
<th>Action</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</section>



<!-- REMINDERS -->

<section class="card">

<h2>Reminders</h2>

<ul id="notifications"></ul>

</section>



<!-- POPUP -->

<div id="popupReminder" class="popup">

<p>Follow-up reminder!</p>

<button id="dismissPopup">Dismiss</button>

</div>


</div>

<script src="app.js"></script>

</body>

</html>
